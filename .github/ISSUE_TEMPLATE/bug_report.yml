name: Bug Report
description: Report a bug
labels: ['bug']
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: How to reproduce the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Browser, OS, version, etc.
